loop:
  prefix: user
  count: 1

subDomain:

gitops:
  applicationName: gitops
  applicationNamespace: openshift-gitops
  destinationNamespace: gitops
  source:
    repoUrl: https://github.com/rh-devsecops-ctf/helm.git
    targetRevision: main
    path: devsecops-ctf/gitops
  values:
    name: gitops
    values:
      controller:
        resources:
          requests:
            cpu: 100m
      dex:
        resources:
          requests:
            cpu: 100m
      repo:
        resources:
          requests:
            cpu: 100m

gitea_operator:
  applicationName: gitea-operator
  applicationNamespace: openshift-gitops
  destinationNamespace: gitea-operator
  source:
    repoUrl: https://github.com/rh-devsecops-ctf/helm.git
    targetRevision: main
    path: devsecops-ctf/operators/gitea-operator

keycloak_operator :
  applicationName: keycloak-operator
  applicationNamespace: openshift-gitops
  destinationNamespace: keycloak-operator
  source:
    repoUrl: https://github.com/rh-devsecops-ctf/helm.git
    targetRevision: main
    path: devsecops-ctf/operators/keycloak-operator


gitea:
  applicationName: gitea
  applicationNamespace: openshift-gitops
  destinationNamespace: gitea
  source:
    repoUrl: https://github.com/rh-devsecops-ctf/helm.git
    targetRevision: main
    path: devsecops-ctf/gitea

# namespaces:
#   - name: kafka
#   - name: globex
#   - name: service-registry
#   - name: globex-cdc

argocd:
  enabled: true
  namespace:
    syncwave: "-1"
  gitops:
    syncwave: "-1" 
  gitea_operator:
    syncwave: "0"
  keycloak_operator:
    syncwave: "0"      
  gitea:
    syncwave: "1"